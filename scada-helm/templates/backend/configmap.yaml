apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: {{ .Values.namespace }}
data:
  APP_NAME: {{ .Values.config.APP_NAME | quote }}
  APP_ENV: {{ .Values.config.APP_ENV | quote }}
  APP_DEBUG: {{ .Values.config.APP_DEBUG | quote }}
  APP_URL: {{ .Values.config.APP_URL | quote }}

  DB_CONNECTION: {{ .Values.config.DB_CONNECTION | quote }}
  DB_HOST: {{ .Values.config.DB_HOST | quote }}
  DB_PORT: {{ .Values.config.DB_PORT | quote }}
  DB_DATABASE: {{ .Values.mysql.database | quote }}
  DB_USERNAME: {{ .Values.mysql.user | quote }}